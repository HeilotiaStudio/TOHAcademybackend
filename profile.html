<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Profile - TOH Academy</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://tohbackend.netlify.app/style.css" rel="stylesheet">
     <!-- VAPID Public Key for Push Notifications -->
    <meta name="vapid-public-key" content="BPsGbP0ag4TUx2CUUm81mUj3k7pN7oU95Pdn0vqd7zAXyt-SN4wIDmDFLdpXB_y4u-zS9qpxphxYNtOw3cBfk68">
    <style>
        body { margin: 0; font-family: 'Poppins', sans-serif; }
        .sidebar { position: fixed; left: 0; top: 0; width: 250px; height: 100vh; background: #1a1a1a; color: #fff; padding: 20px; }
        .sidebar h2 { color: #FF6600; margin-bottom: 30px; }
        .sidebar a { display: block; color: #fff; text-decoration: none; padding: 12px 0; transition: 0.3s; }
        .sidebar a:hover { color: #FF6600; padding-left: 10px; }
        main { margin-left: 250px; padding: 40px; min-height: 100vh; }
        .profile-card { background: #f8f9fa; border-radius: 8px; padding: 30px; margin-bottom: 20px; }
        .profile-header { display: flex; align-items: center; margin-bottom: 30px; }
        .profile-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; margin-right: 30px; }
        .btn-book { background: #FF6600; color: #fff; border: none; padding: 12px 30px; border-radius: 5px; cursor: pointer; }
        .btn-book:hover { background: #e55a00; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; }
        .modal-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; padding: 30px; border-radius: 8px; max-width: 600px; width: 90%; }
        .close-modal { float: right; font-size: 28px; cursor: pointer; color: #666; }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <nav class="sidebar">
        <h2>TOH Academy</h2>
         <a href="https://heilotiastudio.github.io/TOHAcademy/index.html">Home</a>
        <a href="profile.html">My Profile</a>
        <a href="#" onclick="openCoursesModal(); return false;">My Courses</a>
        <a href="#" onclick="openSettingsModal(); return false;">Settings</a>
        <a href="https://tohbackend.netlify.app/signin.html" id="signOutBtn">Sign Out</a>
    </nav>

    <!-- Main content -->
    <main>
        <h1>My Profile</h1>
        
        <div class="profile-card">
            <div class="profile-header">
                <img src="../img/user.jpg" alt="Profile" class="profile-img">
                <div>
                    <h2 id="displayName">John Doe</h2>
                    <p id="displayEmail">john@example.com</p>
                    <button class="btn-book" onclick="openCalendar()">Book a Lesson</button>
                </div>
            </div>

            <form id="profileForm">
                <div class="form-group">
                    <label class="font-weight-bold">Full Name</label>
                    <input type="text" class="form-control border-0 p-3" id="fullName" placeholder="Full Name" required>
                </div>
                <div class="form-group">
                    <label class="font-weight-bold">Email</label>
                    <input type="email" class="form-control border-0 p-3" id="email" placeholder="Email" disabled>
                </div>
                <div class="form-group">
                    <label class="font-weight-bold">New Password (leave blank to keep current)</label>
                    <input type="password" class="form-control border-0 p-3" id="newPassword" placeholder="New Password">
                </div>
                <button class="btn btn-primary px-4 py-2" type="submit">Update Profile</button>
            </form>
        </div>
    </main>

    <!-- Calendar Modal -->
    <div id="calendarModal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-modal" onclick="closeCalendar()">&times;</span>
            <h3>Book a Lesson</h3>
            <div id="calendar-root"></div>
        </div>
    </div>

    <!-- My Courses Modal -->
    <div id="coursesModal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-modal" onclick="closeCoursesModal()">&times;</span>
            <h3>My Enrolled Course</h3>
            <div id="courses-content"></div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-modal" onclick="closeSettingsModal()">&times;</span>
            <h3>Settings</h3>
            <div id="settings-content">
                <!-- Change Password Section -->
                <div style="margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid #ddd;">
                    <h4 style="color: #FF6600; margin-top: 0;">🔐 Change Password</h4>
                    <form id="passwordForm" style="display: flex; flex-direction: column; gap: 10px;">
                        <input type="password" id="settingsPassword" placeholder="New Password" required style="padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                        <input type="password" id="settingsPasswordConfirm" placeholder="Confirm Password" required style="padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                        <button type="submit" style="padding: 10px; background: #FF6600; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">Update Password</button>
                        <p id="passwordMsg" style="margin: 5px 0; font-size: 14px;"></p>
                    </form>
                </div>

                <!-- Email Preferences Section -->
                <div style="margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid #ddd;">
                    <h4 style="color: #FF6600; margin-top: 0;">📧 Email Preferences</h4>
                    <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; margin-bottom: 10px;">
                        <input type="checkbox" id="emailNotif" checked style="width: 18px; height: 18px; cursor: pointer;">
                        <span>Receive booking notifications</span>
                    </label>
                    <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; margin-bottom: 10px;">
                        <input type="checkbox" id="emailNewsletter" checked style="width: 18px; height: 18px; cursor: pointer;">
                        <span>Receive course updates</span>
                    </label>
                    <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                        <input type="checkbox" id="emailMarketing" checked style="width: 18px; height: 18px; cursor: pointer;">
                        <span>Receive promotional emails</span>
                    </label>
                    <button onclick="saveEmailPreferences()" style="margin-top: 12px; width: 100%; padding: 10px; background: #FF6600; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">Save Preferences</button>
                    <p id="emailMsg" style="margin-top: 10px; margin-bottom: 0; font-size: 14px;"></p>
                </div>

                <!-- Delete Account Section -->
                <div>
                    <h4 style="color: #FF6600; margin-top: 0;">⚠️ Danger Zone</h4>
                    <p style="color: #666; font-size: 14px;">Permanently delete your account and all associated data. This cannot be undone.</p>
                    <button onclick="deleteAccount()" style="width: 100%; padding: 10px; background: #dc3545; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">Delete My Account</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        window.supabase = supabase.createClient(
            "https://hpribgbrwyljorezjwsp.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhwcmliZ2Jyd3lsam9yZXpqd3NwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ4ODYzNzUsImV4cCI6MjA4MDQ2MjM3NX0.SmjSKDXGD4WeLvNQooBuV9ZkihATaz4cUXt39_IQMss"
        );

        // Auth guard
        const student = JSON.parse(sessionStorage.getItem('student'));
        if (!student) window.location.href = 'signin.html';

        // Populate profile from session
        document.getElementById('displayName').textContent = student.name;
        document.getElementById('displayEmail').textContent = student.email;
        document.getElementById('fullName').value = student.name;
        document.getElementById('email').value = student.email;

        document.getElementById('signOutBtn').addEventListener('click', function(e) {
            e.preventDefault();
            sessionStorage.removeItem('student');
            window.location.href = 'signin.html';
        });

        // My Courses Modal Functions
        async function openCoursesModal() {
            document.getElementById('coursesModal').style.display = 'block';
            const coursesContent = document.getElementById('courses-content');
            
            try {
                // Fetch course details from Supabase
                const response = await fetch(
                    `https://hpribgbrwyljorezjwsp.supabase.co/rest/v1/courses?title=ilike.%${student.course}%`,
                    {
                        headers: {
                            'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhwcmliZ2Jyd3lsam9yZXpqd3NwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ4ODYzNzUsImV4cCI6MjA4MDQ2MjM3NX0.SmjSKDXGD4WeLvNQooBuV9ZkihATaz4cUXt39_IQMss',
                            'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhwcmliZ2Jyd3lsam9yZXpqd3NwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ4ODYzNzUsImV4cCI6MjA4MDQ2MjM3NX0.SmjSKDXGD4WeLvNQooBuV9ZkihATaz4cUXt39_IQMss'
                        }
                    }
                );
                
                const courses = await response.json();
                
                if (courses.length === 0) {
                    coursesContent.innerHTML = '<p style="color: #666;">No course information available.</p>';
                    return;
                }
                
                const course = courses[0];
                coursesContent.innerHTML = `
                    <div style="background: #f8f9fa; padding: 20px; border-radius: 8px;">
                        <h4 style="color: #FF6600; margin-top: 0;">${course.title}</h4>
                        <img src="../${course.image_url}" alt="${course.title}" style="max-width: 100%; height: auto; border-radius: 8px; margin: 15px 0;">
                        <p><strong>Description:</strong> ${course.description || 'N/A'}</p>
                        <p><strong>Duration:</strong> ${course.duration || 'N/A'}</p>
                        <p><strong>Rating:</strong> ⭐ ${course.rating} / 5 (${course.reviews} reviews)</p>
                        <p><strong>Students Enrolled:</strong> ${course.students}</p>
                        <button style="width: 100%; padding: 12px; background: #FF6600; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold;" onclick="alert('Course content coming soon!')">
                            Start Learning
                        </button>
                    </div>
                `;
            } catch (error) {
                console.error('Error fetching course:', error);
                coursesContent.innerHTML = '<p style="color: red;">Error loading course information.</p>';
            }
        }

        function closeCoursesModal() {
            document.getElementById('coursesModal').style.display = 'none';
        }

        // Settings Modal Functions
        function openSettingsModal() {
            document.getElementById('settingsModal').style.display = 'block';
            loadEmailPreferences();
        }

        function closeSettingsModal() {
            document.getElementById('settingsModal').style.display = 'none';
        }

        // Change Password
        document.getElementById('passwordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const pwd = document.getElementById('settingsPassword').value;
            const pwdConfirm = document.getElementById('settingsPasswordConfirm').value;
            const pwdMsg = document.getElementById('passwordMsg');

            if (pwd !== pwdConfirm) {
                pwdMsg.textContent = '❌ Passwords do not match';
                pwdMsg.style.color = '#dc3545';
                return;
            }

            if (pwd.length < 6) {
                pwdMsg.textContent = '❌ Password must be at least 6 characters';
                pwdMsg.style.color = '#dc3545';
                return;
            }

            try {
                const response = await fetch(
                    'https://hpribgbrwyljorezjwsp.supabase.co/rest/v1/students?email=eq.' + student.email,
                    {
                        method: 'PATCH',
                        headers: {
                            'Content-Type': 'application/json',
                            'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhwcmliZ2Jyd3lsam9yZXpqd3NwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ4ODYzNzUsImV4cCI6MjA4MDQ2MjM3NX0.SmjSKDXGD4WeLvNQooBuV9ZkihATaz4cUXt39_IQMss',
                            'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhwcmliZ2Jyd3lsam9yZXpqd3NwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ4ODYzNzUsImV4cCI6MjA4MDQ2MjM3NX0.SmjSKDXGD4WeLvNQooBuV9ZkihATaz4cUXt39_IQMss'
                        },
                        body: JSON.stringify({ password: pwd })
                    }
                );

                if (response.ok) {
                    pwdMsg.textContent = '✅ Password updated successfully!';
                    pwdMsg.style.color = '#28a745';
                    document.getElementById('passwordForm').reset();
                } else {
                    pwdMsg.textContent = '❌ Error updating password';
                    pwdMsg.style.color = '#dc3545';
                }
            } catch (error) {
                pwdMsg.textContent = '❌ Error: ' + error.message;
                pwdMsg.style.color = '#dc3545';
            }
        });

        // Email Preferences
        function loadEmailPreferences() {
            const prefs = JSON.parse(sessionStorage.getItem('emailPrefs')) || {
                notifications: true,
                newsletter: true,
                marketing: true
            };
            document.getElementById('emailNotif').checked = prefs.notifications;
            document.getElementById('emailNewsletter').checked = prefs.newsletter;
            document.getElementById('emailMarketing').checked = prefs.marketing;
        }

        function saveEmailPreferences() {
            const prefs = {
                notifications: document.getElementById('emailNotif').checked,
                newsletter: document.getElementById('emailNewsletter').checked,
                marketing: document.getElementById('emailMarketing').checked
            };
            sessionStorage.setItem('emailPrefs', JSON.stringify(prefs));
            const emailMsg = document.getElementById('emailMsg');
            emailMsg.textContent = '✅ Preferences saved!';
            emailMsg.style.color = '#28a745';
            setTimeout(() => { emailMsg.textContent = ''; }, 2000);
        }

        // Delete Account
        async function deleteAccount() {
            if (!confirm('⚠️ Are you sure? This will permanently delete your account and all data. This cannot be undone!')) {
                return;
            }
            if (!confirm('This is your last chance. Click OK to permanently delete your account.')) {
                return;
            }

            try {
                const response = await fetch(
                    'https://hpribgbrwyljorezjwsp.supabase.co/rest/v1/students?email=eq.' + student.email,
                    {
                        method: 'DELETE',
                        headers: {
                            'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhwcmliZ2Jyd3lsam9yZXpqd3NwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ4ODYzNzUsImV4cCI6MjA4MDQ2MjM3NX0.SmjSKDXGD4WeLvNQooBuV9ZkihATaz4cUXt39_IQMss',
                            'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhwcmliZ2Jyd3lsam9yZXpqd3NwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ4ODYzNzUsImV4cCI6MjA4MDQ2MjM3NX0.SmjSKDXGD4WeLvNQooBuV9ZkihATaz4cUXt39_IQMss'
                        }
                    }
                );

                if (response.ok) {
                    alert('Account deleted successfully. Redirecting...');
                    sessionStorage.removeItem('student');
                    window.location.href = 'signin.html';
                } else {
                    alert('Error deleting account. Please try again.');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        document.getElementById('profileForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const name = document.getElementById('fullName').value.trim();
            const btn  = this.querySelector('button[type="submit"]');

            btn.textContent = 'Saving...';
            btn.disabled = true;

            const { error } = await window.supabase
                .from('students')
                .update({ name })
                .eq('email', student.email);

            if (error) {
                alert('Error updating profile: ' + error.message);
            } else {
                student.name = name;
                sessionStorage.setItem('student', JSON.stringify(student));
                document.getElementById('displayName').textContent = name;
            }

            btn.textContent = 'Saved!';
            setTimeout(() => { btn.textContent = 'Update Profile'; btn.disabled = false; }, 2000);
        });
    </script>

    <script type="text/babel">
        const { useState } = React;

        function Calendar() {
            const [selectedDate, setSelectedDate] = useState(null);
            const [selectedTime, setSelectedTime] = useState(null);
            const [msg, setMsg] = useState('');

            const times = ['09:00', '10:00', '11:00', '14:00', '15:00', '16:00'];

            const handleBook = async () => {
                if (!selectedDate || !selectedTime) return;
                const d = new Date(selectedDate);
                const { error } = await window.supabase.from('bookings').insert({
                    student_id: null,
                    course: student.course,
                    day: d.getDate(),
                    month: d.getMonth() + 1,
                    year: d.getFullYear(),
                    time: selectedTime,
                    status: 'pending'
                });
                if (error) {
                    setMsg('Booking failed: ' + error.message);
                } else {
                    setMsg('Booking confirmed for ' + selectedDate + ' at ' + selectedTime);
                    setTimeout(() => closeCalendar(), 2000);
                }
            };

            return (
                <div>
                    <div style={{marginBottom:'20px'}}>
                        <label style={{display:'block',marginBottom:'10px',fontWeight:'bold'}}>Select Date:</label>
                        <input type="date" style={{width:'100%',padding:'10px',border:'1px solid #ddd',borderRadius:'5px'}}
                            onChange={e => setSelectedDate(e.target.value)} />
                    </div>
                    <div style={{marginBottom:'20px'}}>
                        <label style={{display:'block',marginBottom:'10px',fontWeight:'bold'}}>Select Time:</label>
                        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'10px'}}>
                            {times.map(time => (
                                <button key={time} type="button" onClick={() => setSelectedTime(time)}
                                    style={{padding:'10px',border:selectedTime===time?'2px solid #FF6600':'1px solid #ddd',
                                        background:selectedTime===time?'#fff5f0':'#fff',borderRadius:'5px',cursor:'pointer'}}>
                                    {time}
                                </button>
                            ))}
                        </div>
                    </div>
                    {msg && <p style={{color:'#FF6600',textAlign:'center'}}>{msg}</p>}
                    <button onClick={handleBook}
                        style={{width:'100%',padding:'12px',background:'#FF6600',color:'#fff',border:'none',borderRadius:'5px',cursor:'pointer',fontSize:'16px'}}>
                        Confirm Booking
                    </button>
                </div>
            );
        }

        function openCalendar() {
            document.getElementById('calendarModal').style.display = 'block';
            ReactDOM.render(<Calendar />, document.getElementById('calendar-root'));
        }

        function closeCalendar() {
            document.getElementById('calendarModal').style.display = 'none';
        }
    </script>
</body>
</html>
