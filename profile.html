<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Student Profile - TOH Academy</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://tohbackend.netlify.app/style.css" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Poppins', sans-serif; background: #f4f7fc; }
        .sidebar { position: fixed; left: 0; top: 0; width: 250px; height: 100vh; background: #1a1a1a; color: #fff; padding: 20px; z-index: 100; }
        .sidebar h2 { color: #FF6600; margin-bottom: 30px; }
        .sidebar a { display: block; color: #fff; text-decoration: none; padding: 12px 0; transition: 0.3s; cursor: pointer; }
        .sidebar a:hover { color: #FF6600; padding-left: 10px; }
        main { margin-left: 250px; padding: 40px; min-height: 100vh; }
        .profile-card { background: #fff; border-radius: 15px; padding: 30px; margin-bottom: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); }
        .profile-header { display: flex; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 20px; }
        .profile-img { width: 120px; height: 120px; border-radius: 50%; background: linear-gradient(135deg, #FF6600, #FF9933); display: flex; align-items: center; justify-content: center; font-size: 48px; color: white; font-weight: bold; }
        .btn-book { background: #FF6600; color: #fff; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .btn-book:hover { background: #e55a00; transform: translateY(-2px); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; transition: 0.3s; }
        .form-control:focus { outline: none; border-color: #FF6600; box-shadow: 0 0 0 3px rgba(255,102,0,0.1); }
        .form-control:disabled { background: #f5f5f5; cursor: not-allowed; }
        .btn-primary { background: #FF6600; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .btn-primary:hover { background: #e55a00; transform: translateY(-2px); }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; }
        .modal-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; padding: 30px; border-radius: 15px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .close-modal { float: right; font-size: 28px; cursor: pointer; color: #666; transition: 0.3s; }
        .close-modal:hover { color: #FF6600; }
        .loading { text-align: center; padding: 40px; font-size: 18px; color: #666; }
        .error-container { text-align: center; padding: 40px; background: #fee; border-radius: 10px; margin: 20px; }
        .course-card { background: #f8f9fa; padding: 20px; border-radius: 10px; margin-bottom: 15px; }
        .time-slots { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 10px; }
        .time-slot { padding: 10px; border: 1px solid #ddd; border-radius: 5px; background: white; cursor: pointer; text-align: center; transition: 0.3s; }
        .time-slot:hover { border-color: #FF6600; background: #fff5f0; }
        .time-slot.selected { background: #FF6600; color: white; border-color: #FF6600; }
        .booking-status { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; display: inline-block; }
        .status-confirmed { background: #d4edda; color: #155724; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-cancelled { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>TOH Academy</h2>
        <a href="https://heilotiastudio.github.io/TOHAcademy/index.html">Home</a>
        <a href="#" class="active">My Profile</a>
        <a href="#" onclick="openCoursesModal(); return false;">My Courses</a>
        <a href="#" onclick="openBookingsModal(); return false;">My Bookings</a>
        <a href="#" onclick="openSettingsModal(); return false;">Settings</a>
        <a href="#" id="signOutBtn">Sign Out</a>
    </div>

    <main>
        <h1>Student Profile</h1>
        <div id="profileContent">
            <div class="loading">Loading profile...</div>
        </div>
    </main>

    <!-- Calendar Modal -->
    <div id="calendarModal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-modal" onclick="closeCalendarModal()">&times;</span>
            <h3>Book a Lesson</h3>
            <div id="calendar-root"></div>
        </div>
    </div>

    <!-- Courses Modal -->
    <div id="coursesModal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-modal" onclick="closeCoursesModal()">&times;</span>
            <h3>My Enrolled Course</h3>
            <div id="courses-content"></div>
        </div>
    </div>

    <!-- Bookings Modal -->
    <div id="bookingsModal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-modal" onclick="closeBookingsModal()">&times;</span>
            <h3>My Bookings</h3>
            <div id="bookings-content"></div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-modal" onclick="closeSettingsModal()">&times;</span>
            <h3>Settings</h3>
            <div id="settings-content"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // CORRECTED Supabase configuration with your actual project URL
        const SUPABASE_URL = "https://lsfkeyjvulvbherwmbbu.supabase.co";  // Fixed: added 'r'
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxzZmtleWp2dWx2YmhlcndtYmJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNTI4ODQsImV4cCI6MjA5MDgyODg4NH0.gARtdg8pUgE_o4VJKhC3jB6UHxwXSX3xbdsH-vrpg5I";
        
        // Create supabase client
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let currentStudent = null;

        // Check authentication - USING CUSTOM SESSION STORAGE
        async function checkAuth() {
            try {
                console.log('Checking authentication...');
                
                // Get student from sessionStorage
                const studentJson = sessionStorage.getItem('student');
                console.log('SessionStorage student:', studentJson);
                
                if (!studentJson) {
                    console.log('No student in sessionStorage, redirecting to signin');
                    window.location.href = 'signin.html';
                    return;
                }
                
                const student = JSON.parse(studentJson);
                console.log('Student found:', student);
                console.log('Student email:', student.email);
                
                if (!student.email) {
                    console.error('Student email is missing!');
                    sessionStorage.removeItem('student');
                    window.location.href = 'signin.html';
                    return;
                }
                
                // Check if this email is a teacher
                const teacherEmails = ['aivars@tohacademy.com', 'zane@tohacademy.com'];
                if (teacherEmails.includes(student.email)) {
                    console.log('Teacher detected, redirecting to admin-profile.html');
                    window.location.href = 'admin-profile.html';
                    return;
                }
                
                // Get fresh student data from database
                console.log('Fetching student from Supabase with email:', student.email);
                const { data: freshStudent, error } = await supabaseClient
                    .from('students')
                    .select('*')
                    .eq('email', student.email)
                    .single();
                
                if (error) {
                    console.error('Error fetching student from DB:', error);
                    document.getElementById('profileContent').innerHTML = `
                        <div class="error-container">
                            <h3>Error loading profile</h3>
                            <p>Database error: ${error.message}</p>
                            <p>Please make sure you are logged in correctly.</p>
                            <button onclick="sessionStorage.removeItem('student'); location.href='signin.html'" class="btn-primary">Sign In Again</button>
                        </div>
                    `;
                    return;
                }
                
                if (!freshStudent) {
                    console.error('Student not found in database');
                    sessionStorage.removeItem('student');
                    window.location.href = 'signin.html';
                    return;
                }
                
                console.log('Fresh student data loaded:', freshStudent);
                currentStudent = freshStudent;
                loadProfile();
                
                // Sign out handler
                document.getElementById('signOutBtn').addEventListener('click', (e) => {
                    e.preventDefault();
                    sessionStorage.removeItem('student');
                    window.location.href = 'signin.html';
                });
                
            } catch (error) {
                console.error('Auth check error:', error);
                document.getElementById('profileContent').innerHTML = `
                    <div class="error-container">
                        <h3>Authentication Error</h3>
                        <p>${error.message}</p>
                        <button onclick="sessionStorage.removeItem('student'); location.href='signin.html'" class="btn-primary">Sign In Again</button>
                    </div>
                `;
            }
        }

        // Load student profile
        function loadProfile() {
            const profileHtml = `
                <div class="profile-card">
                    <div class="profile-header">
                        <div class="profile-img">
                            ${currentStudent.name ? currentStudent.name.charAt(0).toUpperCase() : 'S'}
                        </div>
                        <div>
                            <h2 id="displayName">${escapeHtml(currentStudent.name || 'Student')}</h2>
                            <p id="displayEmail">${escapeHtml(currentStudent.email || '')}</p>
                            <p><strong>📚 Course:</strong> ${escapeHtml(currentStudent.course || 'Not enrolled')}</p>
                            <p><strong>📅 Joined:</strong> ${currentStudent.joined_at ? new Date(currentStudent.joined_at).toLocaleDateString() : 'N/A'}</p>
                            <button class="btn-book" onclick="openCalendarModal()">📅 Book a Lesson</button>
                        </div>
                    </div>

                    <form id="profileForm">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" class="form-control" id="fullName" value="${escapeHtml(currentStudent.name || '')}" required>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" class="form-control" id="email" value="${escapeHtml(currentStudent.email || '')}" disabled>
                        </div>
                        <div class="form-group">
                            <label>Course</label>
                            <input type="text" class="form-control" id="course" value="${escapeHtml(currentStudent.course || 'Not enrolled')}" disabled>
                        </div>
                        <button class="btn-primary" type="submit">💾 Update Profile</button>
                    </form>
                </div>
            `;
            
            document.getElementById('profileContent').innerHTML = profileHtml;
            
            // Handle profile update
            document.getElementById('profileForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const newName = document.getElementById('fullName').value.trim();
                const submitBtn = e.target.querySelector('button[type="submit"]');
                
                if (!newName) {
                    alert('Please enter a name');
                    return;
                }
                
                submitBtn.textContent = 'Saving...';
                submitBtn.disabled = true;
                
                const { error } = await supabaseClient
                    .from('students')
                    .update({ name: newName })
                    .eq('id', currentStudent.id);
                
                if (error) {
                    alert('Error updating profile: ' + error.message);
                } else {
                    currentStudent.name = newName;
                    document.getElementById('displayName').textContent = newName;
                    // Update sessionStorage
                    sessionStorage.setItem('student', JSON.stringify(currentStudent));
                    alert('✅ Profile updated successfully!');
                }
                
                submitBtn.textContent = '💾 Update Profile';
                submitBtn.disabled = false;
            });
        }

        // Courses Modal
        async function openCoursesModal() {
            document.getElementById('coursesModal').style.display = 'block';
            const coursesContent = document.getElementById('courses-content');
            coursesContent.innerHTML = '<div class="loading">Loading course...</div>';
            
            try {
                const { data: courses, error } = await supabaseClient
                    .from('courses')
                    .select('*')
                    .ilike('title', `%${currentStudent.course}%`);
                
                if (error) throw error;
                
                if (!courses || courses.length === 0) {
                    coursesContent.innerHTML = '<p style="color: #666; text-align: center;">No course information available.</p>';
                    return;
                }
                
                const course = courses[0];
                coursesContent.innerHTML = `
                    <div class="course-card">
                        <h4 style="color: #FF6600; margin-top: 0;">${escapeHtml(course.title)}</h4>
                        <p><strong>Description:</strong> ${escapeHtml(course.description || 'N/A')}</p>
                        <p><strong>Duration:</strong> ${escapeHtml(course.duration || 'N/A')}</p>
                        <p><strong>Rating:</strong> ⭐ ${course.rating} / 5 (${course.reviews} reviews)</p>
                        <p><strong>Students Enrolled:</strong> ${course.students}</p>
                        <button style="width: 100%; padding: 12px; background: #FF6600; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 15px;" onclick="alert('Course content coming soon!')">
                            🚀 Start Learning
                        </button>
                    </div>
                `;
            } catch (error) {
                console.error('Error fetching course:', error);
                coursesContent.innerHTML = '<p style="color: red; text-align: center;">Error loading course information.</p>';
            }
        }
        
        function closeCoursesModal() {
            document.getElementById('coursesModal').style.display = 'none';
        }

        // Bookings Modal
        async function openBookingsModal() {
            document.getElementById('bookingsModal').style.display = 'block';
            const bookingsContent = document.getElementById('bookings-content');
            bookingsContent.innerHTML = '<div class="loading">Loading bookings...</div>';
            
            try {
                const { data: bookings, error } = await supabaseClient
                    .from('bookings')
                    .select('*')
                    .eq('student_id', currentStudent.id)
                    .order('year', { ascending: false })
                    .order('month', { ascending: false })
                    .order('day', { ascending: false });
                
                if (error) throw error;
                
                if (!bookings || bookings.length === 0) {
                    bookingsContent.innerHTML = '<p style="color: #666; text-align: center;">📖 No bookings found. Book your first lesson!</p>';
                    return;
                }
                
                bookingsContent.innerHTML = bookings.map(booking => `
                    <div class="course-card">
                        <p><strong>📚 Course:</strong> ${escapeHtml(booking.course)}</p>
                        <p><strong>📅 Date:</strong> ${booking.day}/${booking.month}/${booking.year}</p>
                        <p><strong>⏰ Time:</strong> ${booking.time}</p>
                        <p><strong>Status:</strong> <span class="booking-status status-${booking.status}">${booking.status.toUpperCase()}</span></p>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error fetching bookings:', error);
                bookingsContent.innerHTML = '<p style="color: red; text-align: center;">Error loading bookings.</p>';
            }
        }
        
        function closeBookingsModal() {
            document.getElementById('bookingsModal').style.display = 'none';
        }

        // Settings Modal
        async function openSettingsModal() {
            document.getElementById('settingsModal').style.display = 'block';
            const settingsContent = document.getElementById('settings-content');
            
            settingsContent.innerHTML = `
                <div style="margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid #ddd;">
                    <h4 style="color: #FF6600;">🔐 Change Password</h4>
                    <p style="color: #666; font-size: 14px; margin-bottom: 15px;">Note: Password change requires updating in the database directly or via signin page.</p>
                    <button onclick="alert('Please contact support to change your password.')" style="width: 100%; padding: 10px; background: #FF6600; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
                        Request Password Change
                    </button>
                </div>
                
                <div>
                    <h4 style="color: #FF6600;">⚠️ Danger Zone</h4>
                    <p style="color: #666; font-size: 14px;">Permanently delete your account and all associated data. This cannot be undone.</p>
                    <button onclick="deleteAccount()" style="width: 100%; padding: 10px; background: #dc3545; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
                        🗑️ Delete My Account
                    </button>
                </div>
            `;
        }
        
        function closeSettingsModal() {
            document.getElementById('settingsModal').style.display = 'none';
        }

        // Delete Account
        async function deleteAccount() {
            if (!confirm('⚠️ Are you sure? This will permanently delete your account and all data. This cannot be undone!')) {
                return;
            }
            if (!confirm('This is your last chance. Click OK to permanently delete your account.')) {
                return;
            }
            
            try {
                // Delete from students table (bookings will cascade delete)
                const { error } = await supabaseClient
                    .from('students')
                    .delete()
                    .eq('id', currentStudent.id);
                
                if (error) throw error;
                
                // Clear session and redirect
                sessionStorage.removeItem('student');
                alert('✅ Account deleted successfully.');
                window.location.href = 'signin.html';
            } catch (error) {
                alert('Error deleting account: ' + error.message);
            }
        }

        // Calendar Modal for booking
        async function openCalendarModal() {
            document.getElementById('calendarModal').style.display = 'block';
            const calendarRoot = document.getElementById('calendar-root');
            
            calendarRoot.innerHTML = `
                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 10px; font-weight: bold;">📅 Select Date:</label>
                    <input type="date" id="bookingDate" class="form-control" min="${new Date().toISOString().split('T')[0]}">
                </div>
                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 10px; font-weight: bold;">⏰ Select Time:</label>
                    <div class="time-slots" id="timeSlots">
                        ${['09:00', '10:00', '11:00', '14:00', '15:00', '16:00'].map(time => `
                            <div class="time-slot" data-time="${time}">${time}</div>
                        `).join('')}
                    </div>
                </div>
                <div id="bookingMsg" style="margin-bottom: 15px;"></div>
                <button id="confirmBookingBtn" class="btn-primary" style="width: 100%;">✅ Confirm Booking</button>
            `;
            
            let selectedTime = null;
            
            document.querySelectorAll('.time-slot').forEach(slot => {
                slot.addEventListener('click', () => {
                    document.querySelectorAll('.time-slot').forEach(s => s.classList.remove('selected'));
                    slot.classList.add('selected');
                    selectedTime = slot.dataset.time;
                });
            });
            
            document.getElementById('confirmBookingBtn').addEventListener('click', async () => {
                const date = document.getElementById('bookingDate').value;
                const bookingMsg = document.getElementById('bookingMsg');
                
                if (!date) {
                    bookingMsg.innerHTML = '<span style="color: red;">❌ Please select a date</span>';
                    return;
                }
                if (!selectedTime) {
                    bookingMsg.innerHTML = '<span style="color: red;">❌ Please select a time</span>';
                    return;
                }
                
                const [year, month, day] = date.split('-');
                
                const { error } = await supabaseClient
                    .from('bookings')
                    .insert({
                        student_id: currentStudent.id,
                        course: currentStudent.course,
                        day: parseInt(day),
                        month: parseInt(month),
                        year: parseInt(year),
                        time: selectedTime,
                        status: 'pending'
                    });
                
                if (error) {
                    bookingMsg.innerHTML = `<span style="color: red;">❌ Booking failed: ${error.message}</span>`;
                } else {
                    bookingMsg.innerHTML = '<span style="color: green;">✅ Booking confirmed! Check "My Bookings" for details.</span>';
                    setTimeout(() => closeCalendarModal(), 2000);
                }
            });
        }
        
        function closeCalendarModal() {
            document.getElementById('calendarModal').style.display = 'none';
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Start the app
        checkAuth();
    </script>
</body>
</html>
