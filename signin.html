<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Sign In - TOH Academy</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://tohbackend.netlify.app/style.css" rel="stylesheet">

    <style>
        .captcha-box { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 14px; }
        .captcha-box p { font-size: 0.82rem; color: #555; margin-bottom: 10px; text-align: center; }
        .captcha-images { display: flex; gap: 8px; justify-content: center; }
        .captcha-images img { width: 100px; height: 70px; object-fit: cover; border-radius: 5px; border: 2px solid transparent; cursor: grab; transition: border 0.2s, transform 0.2s; }
        .captcha-images img.drag-over { border-color: #FF6600; transform: scale(1.05); }
        .captcha-images img.dragging { opacity: 0.4; }
        .captcha-error { color: #dc3545; font-size: 0.8rem; text-align: center; margin-top: 6px; display: none; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
        .shake { animation: shake 0.3s ease; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .loading-spinner { color: white; font-size: 24px; }
    </style>
</head>

<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner">
            <i class="fas fa-spinner fa-spin fa-3x"></i>
            <p style="margin-top: 10px;">Signing in...</p>
        </div>
    </div>

    <div class="container-fluid d-flex align-items-center justify-content-center"
         style="min-height: 100vh; background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('../img/carousel-1.jpg') center center no-repeat; background-size: cover;">

        <div class="card border-0" style="max-width: 450px; width: 100%;">
            <div class="card-header bg-primary text-center p-4">
                <h2 class="text-white m-0">Sign In</h2>
            </div>

            <div class="card-body bg-secondary p-5">
                <form id="signInForm" onsubmit="validateCaptcha(event)">
                    <div class="form-group">
                        <input type="email" class="form-control border-0 p-4" id="email" placeholder="Email" required>
                    </div>

                    <div class="form-group">
                        <input type="password" class="form-control border-0 p-4" id="password" placeholder="Password" required>
                    </div>

                    <div class="form-group">
                        <div class="captcha-box">
                            <p>Sort from <strong>fewest</strong> to <strong>most</strong> people, left to right</p>

                            <div class="captcha-images" id="captchaSlots">
                                <img src="../img/team-1.jpg" alt="1 person" data-id="1" draggable="true">
                                <img src="../img/cat-5.jpg" alt="3 people" data-id="2" draggable="true">
                                <img src="../img/cat-6.jpg" alt="6 people" data-id="3" draggable="true">
                            </div>

                            <div class="captcha-error" id="captchaError">Incorrect order — please try again</div>
                        </div>
                    </div>

                    <button class="btn btn-primary btn-block border-0 py-3" type="submit">Sign In</button>
                </form>

                <div class="text-center mt-3">
                    <a href="forgot-password.html" class="text-primary">Forgot Password?</a>
                </div>

                <div class="text-center mt-2">
                    <span>Don't have an account? </span><a href="register.html" class="text-primary">Register</a>
                </div>
            </div>
        </div>
    </div>

<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// Supabase configuration
const SUPABASE_URL = "https://lsfkeyjvulvbherwmbbu.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxzZmtleWp2dWx2YmhlcndtYmJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNTI4ODQsImV4cCI6MjA5MDgyODg4NH0.gARtdg8pUgE_o4VJKhC3jB6UHxwXSX3xbdsH-vrpg5I";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* -----------------------------
   CAPTCHA LOGIC
------------------------------*/
const CORRECT_ORDER = ['1','2','3'];
let dragSrc = null;

function initCaptcha() {
    const slots = document.getElementById('captchaSlots');
    const imgs = [...slots.querySelectorAll('img')].sort(() => Math.random() - 0.5);

    slots.innerHTML = '';

    imgs.forEach(img => {
        slots.appendChild(img);

        img.addEventListener('dragstart', () => {
            dragSrc = img;
            img.classList.add('dragging');
        });

        img.addEventListener('dragend', () => img.classList.remove('dragging'));

        img.addEventListener('dragover', e => {
            e.preventDefault();
            img.classList.add('drag-over');
        });

        img.addEventListener('dragleave', () => img.classList.remove('drag-over'));

        img.addEventListener('drop', e => {
            e.preventDefault();
            img.classList.remove('drag-over');

            if (dragSrc && dragSrc !== img) {
                const allImgs = [...slots.querySelectorAll('img')];
                const fromIdx = allImgs.indexOf(dragSrc);
                const toIdx   = allImgs.indexOf(img);

                if (fromIdx < toIdx) slots.insertBefore(dragSrc, img.nextSibling);
                else slots.insertBefore(dragSrc, img);
            }
        });
    });
}

function verifyCaptcha() {
    const order = [...document.querySelectorAll('#captchaSlots img')].map(i => i.dataset.id);
    return JSON.stringify(order) === JSON.stringify(CORRECT_ORDER);
}

initCaptcha();

/* -----------------------------
   TEACHER SIGN-IN (Supabase Auth)
------------------------------*/
async function signinTeacher(email, password) {
    try {
        console.log("Attempting teacher sign-in with Supabase Auth...");
        
        const { data, error } = await supabase.auth.signInWithPassword({
            email: email,
            password: password
        });

        if (error) {
            console.log("Teacher auth failed:", error.message);
            return null;
        }

        if (data && data.user) {
            console.log("Teacher authenticated:", data.user);
            
            // Get teacher info from teachers table
            const { data: teacherData, error: teacherError } = await supabase
                .from('teachers')
                .select('*')
                .eq('email', email)
                .single();
            
            if (teacherError) {
                console.log("Teacher not found in teachers table:", teacherError);
                // Still return basic user info
                return {
                    id: data.user.id,
                    name: data.user.email?.split('@')[0] || 'Teacher',
                    email: data.user.email,
                    role: 'Teacher',
                    isTeacher: true
                };
            }
            
            return {
                ...teacherData,
                id: data.user.id,
                isTeacher: true
            };
        }
        
        return null;
    } catch (error) {
        console.error("Teacher sign-in error:", error);
        return null;
    }
}

/* -----------------------------
   STUDENT SIGN-IN (Custom RPC)
------------------------------*/
async function signinStudent(email, password) {
    try {
        console.log("Attempting student sign-in with RPC...");
        
        const { data, error } = await supabase.rpc('signin_student', {
            p_email: email,
            p_password: password
        });

        if (error) {
            console.log("Student RPC error:", error);
            return null;
        }

        if (!data || (Array.isArray(data) && data.length === 0)) {
            console.log("No student found with these credentials");
            return null;
        }

        const studentData = Array.isArray(data) && data.length > 0 ? data[0] : data;
        console.log("Student authenticated:", studentData);
        
        return {
            ...studentData,
            isTeacher: false
        };
    } catch (error) {
        console.error("Student sign-in error:", error);
        return null;
    }
}

/* -----------------------------
   MAIN SIGN-IN FUNCTION
------------------------------*/
async function handleSignIn() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    if (!email || !password) {
        alert("Please enter email and password");
        return null;
    }

    // Show loading overlay
    document.getElementById('loadingOverlay').style.display = 'flex';
    
    try {
        // First, try teacher sign-in (for @tohacademy.com emails)
        if (email.includes('@tohacademy.com')) {
            console.log("Teacher email detected");
            const teacher = await signinTeacher(email, password);
            if (teacher) {
                sessionStorage.setItem('user', JSON.stringify(teacher));
                sessionStorage.setItem('userType', 'teacher');
                return teacher;
            }
        }
        
        // Try student sign-in
        console.log("Trying student sign-in");
        const student = await signinStudent(email, password);
        if (student) {
            sessionStorage.setItem('user', JSON.stringify(student));
            sessionStorage.setItem('userType', 'student');
            return student;
        }
        
        // If neither worked
        alert("Invalid email or password. Please try again.");
        initCaptcha();
        return null;
        
    } catch (error) {
        console.error("Sign-in error:", error);
        alert("Network error. Please try again.");
        initCaptcha();
        return null;
    } finally {
        document.getElementById('loadingOverlay').style.display = 'none';
    }
}

/* -----------------------------
   CAPTCHA + SIGN-IN FLOW
------------------------------*/
async function validateCaptcha(event) {
    event.preventDefault();
    const errEl = document.getElementById('captchaError');

    if (!verifyCaptcha()) {
        errEl.style.display = 'block';
        document.getElementById('captchaSlots').classList.add('shake');

        setTimeout(() => {
            document.getElementById('captchaSlots').classList.remove('shake');
        }, 400);

        initCaptcha();
        return;
    }

    errEl.style.display = 'none';

    // Sign in
    const user = await handleSignIn();
    
    if (user) {
        console.log("Sign-in successful, redirecting...", user);
        
        // Redirect based on user type
        if (user.isTeacher) {
            window.location.href = "admin-profile.html";
        } else {
            window.location.href = "profile.html";
        }
    }
}
</script>

</body>
</html>
