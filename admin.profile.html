    function BookingsView() {
        const [allBookings, setAllBookings] = useState([]);
        const [loading, setLoading] = useState(true);
        const today = new Date();
        const [current, setCurrent] = useState(new Date(today.getFullYear(), today.getMonth(), 1));
        const [modal, setModal] = useState(null);

        useEffect(() => {
            // Fetch real bookings from Supabase
            window.supabase.from('bookings').select('*, students(name)')
                .then(({ data, error }) => {
                    if (error) {
                        console.error("Error fetching bookings:", error);
                    } else {
                        console.log("Bookings loaded:", data);
                        setAllBookings(data || []);
                    }
                    setLoading(false);
                });
        }, []);

        const year  = current.getFullYear();
        const month = current.getMonth();
        const firstDay = new Date(year, month, 1);
        const lastDay  = new Date(year, month + 1, 0);
        const startOffset = (firstDay.getDay() + 6) % 7;

        const cells = [];
        for (let i = 0; i < startOffset; i++)
            cells.push({ date: new Date(year, month, -startOffset + i + 1), current: false });
        for (let d = 1; d <= lastDay.getDate(); d++)
            cells.push({ date: new Date(year, month, d), current: true });
        const remaining = 7 - (cells.length % 7);
        if (remaining < 7)
            for (let d = 1; d <= remaining; d++)
                cells.push({ date: new Date(year, month + 1, d), current: false });

        const monthBookings = allBookings.filter(b => {
            const bDate = new Date(b.year, b.month - 1, b.day);
            return bDate.getMonth() === month && bDate.getFullYear() === year;
        });

        const confirmed = monthBookings.filter(b => b.status === 'confirmed').length;
        const pending   = monthBookings.filter(b => b.status === 'pending').length;
        const cancelled = monthBookings.filter(b => b.status === 'cancelled').length;

        if (loading) return <div className="page-header"><p>Loading bookings...</p></div>;

        return (
            <div>
                <div className="page-header">
                    <h1 style={{color:'#dc3545'}}>Bookings Calendar</h1>
                    <div className="cal-nav">
                        <button type="button" aria-label="Previous month" onClick={() => setCurrent(new Date(year, month - 1, 1))}><i className="fa fa-chevron-left"></i></button>
                        <h2>{monthNames[month]} {year}</h2>
                        <button type="button" aria-label="Next month" onClick={() => setCurrent(new Date(year, month + 1, 1))}><i className="fa fa-chevron-right"></i></button>
                    </div>
                </div>

                <div className="stats">
                    {[['orange','fa-calendar-check',monthBookings.length,'Total This Month'],
                      ['green', 'fa-check-circle',  confirmed,      'Confirmed'],
                      ['yellow','fa-clock',          pending,        'Pending'],
                      ['red',   'fa-times-circle',   cancelled,      'Cancelled']
                    ].map(([color, icon, count, label]) => (
                        <div key={label} className="stat-card">
                            <div className={`stat-icon ${color}`}><i className={`fa ${icon}`}></i></div>
                            <div className="stat-info"><h3>{count}</h3><p>{label}</p></div>
                        </div>
                    ))}
                </div>

                <div className="calendar">
                    <div className="cal-header">
                        {['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d => <div key={d}>{d}</div>)}
                    </div>
                    <div className="cal-body">
                        {cells.map(({ date, current: isCurrent }, i) => {
                            const isToday = date.toDateString() === today.toDateString();
                            const dayBookings = isCurrent
                                ? monthBookings.filter(b => b.day === date.getDate())
                                : [];
                            return (
                                <div key={i} className={`cal-cell${!isCurrent ? ' other-month' : ''}${isToday ? ' today' : ''}`}>
                                    <div className="day-num">{date.getDate()}</div>
                                    {dayBookings.map(b => (
                                        <div key={b.id} className={`booking ${b.status}`} onClick={() => setModal({ b, date })}>
                                            {b.time} {b.students?.name?.split(' ')[0] || 'Student'}
                                        </div>
                                    ))}
                                </div>
                            );
                        })}
                    </div>
                </div>

                {modal && (
                    <div className="modal-overlay open" onClick={e => e.target.classList.contains('modal-overlay') && setModal(null)}>
                        <div className="modal-content">
                            <h3><i className="fa fa-calendar-alt mr-2"></i>Booking Details</h3>
                            <div className="modal-row">
    <span style={{color: '#FF6600'}}>Student</span>
    <span>{modal.b.students?.name || 'Unknown'}</span>
</div>
                            <div className="modal-row"><span>Course</span><span>{modal.b.course}</span></div>
                            <div className="modal-row"><span>Date</span><span>{modal.date.toLocaleDateString('en-GB', { weekday:'long', year:'numeric', month:'long', day:'numeric' })}</span></div>
                            <div className="modal-row"><span>Time</span><span>{modal.b.time}</span></div>
                            <div className="modal-row"><span>Status</span>
                                <span className={`status-badge ${modal.b.status}`}>{modal.b.status.charAt(0).toUpperCase() + modal.b.status.slice(1)}</span>
                            </div>
                            <div className="modal-actions">
                                <button type="button" className="btn-close" onClick={() => setModal(null)}>Close</button>
                            </div>
                        </div>
                    </div>
                )}
            </div>
        );
    }

function SettingsView() {
    const [currentPassword, setCurrentPassword] = useState('');
    const [newPassword, setNewPassword] = useState('');
    const [confirmPassword, setConfirmPassword] = useState('');
    const [message, setMessage] = useState('');
    const [messageType, setMessageType] = useState('');

    // Change password function
    const handleChangePassword = async (e) => {
        e.preventDefault();
        setMessage('');
        
        if (newPassword !== confirmPassword) {
            setMessageType('error');
            setMessage('❌ New passwords do not match');
            return;
        }
        
        if (newPassword.length < 6) {
            setMessageType('error');
            setMessage('❌ Password must be at least 6 characters');
            return;
        }
        
        try {
            const { error } = await window.supabase.auth.updateUser({
                password: newPassword
            });
            
            if (error) throw error;
            
            setMessageType('success');
            setMessage('✅ Password updated successfully!');
            setCurrentPassword('');
            setNewPassword('');
            setConfirmPassword('');
            
            setTimeout(() => setMessage(''), 3000);
        } catch (error) {
            setMessageType('error');
            setMessage(`❌ Error: ${error.message}`);
        }
    };

    // Delete account function
    const handleDeleteAccount = async () => {
        if (!confirm('⚠️ Are you sure? This will permanently delete your account and all associated data. This cannot be undone!')) {
            return;
        }
        
        if (!confirm('This is your last chance. Click OK to permanently delete your account.')) {
            return;
        }
        
        try {
            // Get current user
            const { data: { user } } = await window.supabase.auth.getUser();
            
            // Delete from teachers table first
            await window.supabase
                .from('teachers')
                .delete()
                .eq('email', user.email);
            
            // Delete the auth user
            const { error } = await window.supabase.auth.admin.deleteUser(user.id);
            
            if (error) throw error;
            
            // Sign out
            await window.supabase.auth.signOut();
            alert('✅ Account deleted successfully.');
            window.location.href = 'https://heilotiastudio.github.io/TOHAcademy//index.html';
        } catch (error) {
            alert('Error deleting account: ' + error.message);
        }
    };

    return (
        <div>
            <div className="page-header">
                <h1 style={{color: '#FF6600'}}>Settings</h1>
            </div>
            
            <div style={{maxWidth: '600px'}}>
                {/* Change Password Section */}
                <div style={{background: '#fff', borderRadius: '10px', padding: '25px', marginBottom: '30px', boxShadow: '0 2px 10px rgba(0,0,0,0.07)'}}>
                    <h3 style={{color: '#FF6600', marginTop: 0, marginBottom: '20px'}}>
                        <i className="fa fa-key" style={{marginRight: '10px'}}></i>
                        Change Password
                    </h3>
                    
                    <form onSubmit={handleChangePassword}>
                        <div style={{marginBottom: '15px'}}>
                            <label style={{display: 'block', marginBottom: '5px', color: '#666', fontWeight: '500'}}>
                                New Password
                            </label>
                            <input 
                                type="password"
                                value={newPassword}
                                onChange={(e) => setNewPassword(e.target.value)}
                                required
                                style={{
                                    width: '100%',
                                    padding: '10px',
                                    border: '1px solid #ddd',
                                    borderRadius: '5px',
                                    fontSize: '14px'
                                }}
                            />
                        </div>
                        
                        <div style={{marginBottom: '20px'}}>
                            <label style={{display: 'block', marginBottom: '5px', color: '#666', fontWeight: '500'}}>
                                Confirm New Password
                            </label>
                            <input 
                                type="password"
                                value={confirmPassword}
                                onChange={(e) => setConfirmPassword(e.target.value)}
                                required
                                style={{
                                    width: '100%',
                                    padding: '10px',
                                    border: '1px solid #ddd',
                                    borderRadius: '5px',
                                    fontSize: '14px'
                                }}
                            />
                        </div>
                        
                        {message && (
                            <div style={{
                                padding: '10px',
                                borderRadius: '5px',
                                marginBottom: '15px',
                                background: messageType === 'success' ? '#d4edda' : '#f8d7da',
                                color: messageType === 'success' ? '#155724' : '#721c24',
                                border: `1px solid ${messageType === 'success' ? '#c3e6cb' : '#f5c6cb'}`
                            }}>
                                {message}
                            </div>
                        )}
                        
                        <button 
                            type="submit"
                            style={{
                                width: '100%',
                                padding: '12px',
                                background: '#FF6600',
                                color: 'white',
                                border: 'none',
                                borderRadius: '5px',
                                cursor: 'pointer',
                                fontWeight: '600',
                                fontSize: '14px'
                            }}
                            onMouseEnter={(e) => e.target.style.background = '#cc5200'}
                            onMouseLeave={(e) => e.target.style.background = '#FF6600'}
                        >
                            Update Password
                        </button>
                    </form>
                </div>
                
                {/* Danger Zone - Delete Account */}
                <div style={{background: '#fff', borderRadius: '10px', padding: '25px', boxShadow: '0 2px 10px rgba(0,0,0,0.07)', border: '1px solid #f8d7da'}}>
                    <h3 style={{color: '#dc3545', marginTop: 0, marginBottom: '15px'}}>
                        <i className="fa fa-exclamation-triangle" style={{marginRight: '10px'}}></i>
                        Danger Zone
                    </h3>
                    <p style={{color: '#666', fontSize: '14px', marginBottom: '20px'}}>
                        Permanently delete your account and all associated data. This cannot be undone.
                    </p>
                    <button 
                        onClick={handleDeleteAccount}
                        style={{
                            width: '100%',
                            padding: '12px',
                            background: '#dc3545',
                            color: 'white',
                            border: 'none',
                            borderRadius: '5px',
                            cursor: 'pointer',
                            fontWeight: '600',
                            fontSize: '14px'
                        }}
                        onMouseEnter={(e) => e.target.style.background = '#c82333'}
                        onMouseLeave={(e) => e.target.style.background = '#dc3545'}
                    >
                        Delete My Account
                    </button>
                </div>
            </div>
        </div>
    );
}

function ProfileView() {
    const [teacher, setTeacher] = useState(null);
    const [loading, setLoading] = useState(true);
    const [editing, setEditing] = useState(false);
    const [name, setName] = useState('');
    const [bio, setBio] = useState('');
    const [message, setMessage] = useState('');
    const [messageType, setMessageType] = useState('');
    const [avatarFile, setAvatarFile] = useState(null);
    const [avatarPreview, setAvatarPreview] = useState('');
    const [uploading, setUploading] = useState(false);

    useEffect(() => {
        loadTeacherProfile();
    }, []);

    const loadTeacherProfile = async () => {
        try {
            const { data: { user } } = await window.supabase.auth.getUser();
            
            if (user) {
                const { data, error } = await window.supabase
                    .from('teachers')
                    .select('*')
                    .eq('email', user.email)
                    .single();
                
                if (error) throw error;
                
                setTeacher(data);
                setName(data.name);
                setBio(data.bio || '');
                
                // Load avatar from Supabase Storage if exists
                if (data.avatar_url) {
                    const { data: { publicUrl } } = window.supabase
                        .storage
                        .from('teacher-avatars')
                        .getPublicUrl(data.avatar_url);
                    setAvatarPreview(publicUrl);
                }
            }
        } catch (error) {
            console.error('Error loading profile:', error);
            setMessageType('error');
            setMessage('Error loading profile: ' + error.message);
        } finally {
            setLoading(false);
        }
    };

    const handleFileSelect = (e) => {
        const file = e.target.files[0];
        if (file) {
            // Check if file is an image
            if (!file.type.startsWith('image/')) {
                setMessageType('error');
                setMessage('Please select an image file (JPEG, PNG, GIF)');
                return;
            }
            
            setAvatarFile(file);
            const reader = new FileReader();
            reader.onloadend = () => {
                setAvatarPreview(reader.result);
            };
            reader.readAsDataURL(file);
        }
    };

    const uploadAvatar = async () => {
        if (!avatarFile) return null;
        
        setUploading(true);
        try {
            const { data: { user } } = await window.supabase.auth.getUser();
            const fileExt = avatarFile.name.split('.').pop();
            const fileName = `${user.id}-${Date.now()}.${fileExt}`;
            
            // Upload to Supabase Storage
            const { error: uploadError } = await window.supabase.storage
                .from('teacher-avatars')
                .upload(fileName, avatarFile, {
                    cacheControl: '3600',
                    upsert: false
                });
            
            if (uploadError) throw uploadError;
            
            return fileName;
        } catch (error) {
            console.error('Upload error:', error);
            setMessageType('error');
            setMessage('Error uploading image: ' + error.message);
            return null;
        } finally {
            setUploading(false);
        }
    };

    const handleUpdateProfile = async (e) => {
        e.preventDefault();
        setMessage('');
        
        try {
            const { data: { user } } = await window.supabase.auth.getUser();
            
            let avatarPath = teacher?.avatar_url;
            
            // Upload new avatar if selected
            if (avatarFile) {
                const newAvatarPath = await uploadAvatar();
                if (newAvatarPath) {
                    avatarPath = newAvatarPath;
                }
            }
            
            const { error } = await window.supabase
                .from('teachers')
                .update({
                    name: name,
                    bio: bio,
                    avatar_url: avatarPath
                })
                .eq('email', user.email);
            
            if (error) throw error;
            
            setTeacher({ ...teacher, name, bio, avatar_url: avatarPath });
            setEditing(false);
            setAvatarFile(null);
            setMessageType('success');
            setMessage('✅ Profile updated successfully!');
            setTimeout(() => setMessage(''), 3000);
        } catch (error) {
            setMessageType('error');
            setMessage('❌ Error updating profile: ' + error.message);
        }
    };

    const getInitials = (name) => {
        return name ? name.charAt(0).toUpperCase() : 'T';
    };

    if (loading) {
        return (
            <div>
                <div className="page-header">
                    <h1 style={{color: '#FF6600'}}>My Profile</h1>
                </div>
                <div style={{textAlign: 'center', padding: '50px'}}>Loading profile...</div>
            </div>
        );
    }

    if (!teacher) {
        return (
            <div>
                <div className="page-header">
                    <h1 style={{color: '#FF6600'}}>My Profile</h1>
                </div>
                <div style={{textAlign: 'center', padding: '50px', color: 'red'}}>Profile not found</div>
            </div>
        );
    }

    return (
        <div>
            <div className="page-header">
                <h1 style={{color: '#FF6600'}}>My Profile</h1>
            </div>
            
            <div style={{maxWidth: '800px', margin: '0 auto'}}>
                <div style={{background: '#fff', borderRadius: '15px', padding: '30px', boxShadow: '0 2px 15px rgba(0,0,0,0.08)'}}>
                    
                    {/* Profile Header with Avatar */}
                    <div style={{display: 'flex', alignItems: 'center', gap: '30px', marginBottom: '30px', flexWrap: 'wrap'}}>
                        <div style={{textAlign: 'center'}}>
                            <div style={{
                                width: '120px',
                                height: '120px',
                                borderRadius: '50%',
                                background: 'linear-gradient(135deg, #FF6600, #FF9933)',
                                display: 'flex',
                                alignItems: 'center',
                                justifyContent: 'center',
                                fontSize: '48px',
                                color: 'white',
                                fontWeight: 'bold',
                                overflow: 'hidden'
                            }}>
                                {avatarPreview ? (
                                    <img src={avatarPreview} alt={teacher.name} style={{width: '100%', height: '100%', objectFit: 'cover'}} />
                                ) : (
                                    getInitials(teacher.name)
                                )}
                            </div>
                            {editing && (
                                <label style={{
                                    display: 'inline-block',
                                    marginTop: '10px',
                                    padding: '5px 10px',
                                    background: '#FF6600',
                                    color: 'white',
                                    borderRadius: '5px',
                                    cursor: 'pointer',
                                    fontSize: '12px'
                                }}>
                                    <i className="fa fa-upload"></i> Change Photo
                                    <input 
                                        type="file"
                                        accept="image/jpeg,image/jpg,image/png,image/gif"
                                        onChange={handleFileSelect}
                                        style={{display: 'none'}}
                                    />
                                </label>
                            )}
                        </div>
                        
                        <div>
                            <h2 style={{margin: '0 0 5px 0', color: '#333'}}>{teacher.name}</h2>
                            <p style={{margin: '0 0 5px 0', color: '#666'}}>
                                <i className="fa fa-envelope" style={{color: '#FF6600', marginRight: '8px'}}></i>
                                {teacher.email}
                            </p>
                            <p style={{margin: '0', color: '#666'}}>
                                <i className="fa fa-briefcase" style={{color: '#FF6600', marginRight: '8px'}}></i>
                                {teacher.role || 'Instructor'}
                            </p>
                        </div>
                    </div>
                    
                    {message && (
                        <div style={{
                            padding: '10px',
                            borderRadius: '5px',
                            marginBottom: '20px',
                            background: messageType === 'success' ? '#d4edda' : '#f8d7da',
                            color: messageType === 'success' ? '#155724' : '#721c24',
                            border: `1px solid ${messageType === 'success' ? '#c3e6cb' : '#f5c6cb'}`
                        }}>
                            {message}
                        </div>
                    )}
                    
                    {!editing ? (
                        <div>
                            <div style={{marginBottom: '20px', paddingBottom: '15px', borderBottom: '1px solid #f0f0f0'}}>
                                <h3 style={{color: '#FF6600', marginTop: 0, marginBottom: '10px'}}>
                                    <i className="fa fa-info-circle"></i> Bio
                                </h3>
                                <p style={{color: '#555', lineHeight: '1.6'}}>{teacher.bio || 'No bio provided yet.'}</p>
                            </div>
                            
                            <button 
                                onClick={() => setEditing(true)}
                                style={{
                                    width: '100%',
                                    padding: '12px',
                                    background: '#FF6600',
                                    color: 'white',
                                    border: 'none',
                                    borderRadius: '8px',
                                    cursor: 'pointer',
                                    fontWeight: '600',
                                    fontSize: '16px'
                                }}
                                onMouseEnter={(e) => e.target.style.background = '#cc5200'}
                                onMouseLeave={(e) => e.target.style.background = '#FF6600'}
                            >
                                <i className="fa fa-edit"></i> Edit Profile
                            </button>
                        </div>
                    ) : (
                        <form onSubmit={handleUpdateProfile}>
                            <div style={{marginBottom: '20px'}}>
                                <label style={{display: 'block', marginBottom: '8px', color: '#333', fontWeight: '500'}}>
                                    <i className="fa fa-user"></i> Full Name
                                </label>
                                <input 
                                    type="text"
                                    value={name}
                                    onChange={(e) => setName(e.target.value)}
                                    required
                                    style={{
                                        width: '100%',
                                        padding: '10px',
                                        border: '1px solid #ddd',
                                        borderRadius: '5px',
                                        fontSize: '14px'
                                    }}
                                />
                            </div>
                            
                            <div style={{marginBottom: '20px'}}>
                                <label style={{display: 'block', marginBottom: '8px', color: '#333', fontWeight: '500'}}>
                                    <i className="fa fa-align-left"></i> Bio
                                </label>
                                <textarea 
                                    value={bio}
                                    onChange={(e) => setBio(e.target.value)}
                                    rows="4"
                                    placeholder="Tell us about yourself..."
                                    style={{
                                        width: '100%',
                                        padding: '10px',
                                        border: '1px solid #ddd',
                                        borderRadius: '5px',
                                        fontSize: '14px',
                                        fontFamily: 'inherit'
                                    }}
                                />
                            </div>
                            
                            <div style={{display: 'flex', gap: '10px'}}>
                                <button 
                                    type="submit"
                                    disabled={uploading}
                                    style={{
                                        flex: 1,
                                        padding: '12px',
                                        background: '#28a745',
                                        color: 'white',
                                        border: 'none',
                                        borderRadius: '5px',
                                        cursor: uploading ? 'not-allowed' : 'pointer',
                                        fontWeight: '600',
                                        opacity: uploading ? 0.6 : 1
                                    }}
                                >
                                    {uploading ? <i className="fa fa-spinner fa-spin"></i> : <i className="fa fa-save"></i>} 
                                    {uploading ? ' Uploading...' : ' Save Changes'}
                                </button>
                                <button 
                                    type="button"
                                    onClick={() => {
                                        setEditing(false);
                                        setName(teacher.name);
                                        setBio(teacher.bio || '');
                                        setAvatarFile(null);
                                        if (teacher.avatar_url) {
                                            const { data: { publicUrl } } = window.supabase
                                                .storage
                                                .from('teacher-avatars')
                                                .getPublicUrl(teacher.avatar_url);
                                            setAvatarPreview(publicUrl);
                                        } else {
                                            setAvatarPreview('');
                                        }
                                    }}
                                    style={{
                                        flex: 1,
                                        padding: '12px',
                                        background: '#6c757d',
                                        color: 'white',
                                        border: 'none',
                                        borderRadius: '5px',
                                        cursor: 'pointer',
                                        fontWeight: '600'
                                    }}
                                >
                                    <i className="fa fa-times"></i> Cancel
                                </button>
                            </div>
                        </form>
                    )}
                </div>
            </div>
        </div>
    );
}

        
function App() {
    const [view, setView] = useState('profile');  // Changed default to 'profile'

    const nav = (v, href, icon, label, badge) => href
        ? <a href={href}><i className={`fa ${icon} mr-2`}></i>{label}</a>
        : <a href="#" className={view === v ? 'active' : ''} onClick={e => { e.preventDefault(); setView(v); }}>
            <i className={`fa ${icon} mr-2`}></i>{label}
            {badge && <span className="badge">{badge}</span>}
          </a>;

    return (
        <>
            <nav className="sidebar">
                <h2>TOH Academy</h2>
                {nav(null,       'https://heilotiastudio.github.io/TOHAcademy/index.html', 'fa-home',  'Home')}
                {nav('profile',  null,            'fa-user',         'My Profile')}  {/* Changed this line */}
                {nav('bookings',  null,            'fa-calendar',     'Bookings', 3)}
                {nav('students',  null,            'fa-users',        'Students')}
                {nav('courses',   null,            'fa-book',         'Courses')}
                {nav('settings',  null,            'fa-cog',          'Settings')}
                {nav(null,       '#',             'fa-sign-out-alt', 'Sign Out')}
            </nav>
            <main>
                {view === 'profile'   && <ProfileView />}  {/* Add this line */}
                {view === 'bookings'  && <BookingsView />}
                {view === 'courses'   && <CoursesView />}
                {view === 'students'  && <StudentsView />}
                {view === 'settings'  && <SettingsView />}
            </main>
        </>
    );
}
     

    

    ReactDOM.createRoot(document.getElementById('app-root')).render(<App />);
    </script>
</body>
</html>
