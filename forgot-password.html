<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Forgot Password - TOH Academy</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid d-flex align-items-center justify-content-center" style="min-height: 100vh; background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('../img/carousel-3.jpg') center center no-repeat; background-size: cover;">
        <div class="card border-0" style="max-width: 450px; width: 100%;">
            <div class="card-header bg-primary text-center p-4">
                <h2 class="text-white m-0">Forgot Password</h2>
            </div>
            <div class="card-body bg-secondary p-5">
                <p class="text-center mb-4">Enter your email address and we'll send you a link to reset your password.</p>
                <form id="forgotPasswordForm">
                    <div class="form-group">
                        <input type="email" class="form-control border-0 p-4" id="email" placeholder="Email" required>
                    </div>
                    <button class="btn btn-primary btn-block border-0 py-3" type="submit">Send Reset Link</button>
                </form>
                <div class="text-center mt-3">
                    <a href="signin.html" class="text-primary">Back to Sign In</a>
                </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.bundle.min.js"></script>
</body>
</html>
